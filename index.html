
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>darkzin-repo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }
        h1 {
            color: #f0f6fc;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn-sileo {
            display: inline-block;
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(75, 108, 183, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-sileo:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(75, 108, 183, 0.6);
        }
        .btn-sileo:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>darkzin-repo</h1>
        <p>Bem-vindo à minha repo de tweaks pessoal!</p>
        
        <a href="sileo://source/https://darkzin-dev.github.io/darkzin-repo/" class="btn-sileo">
            ➕ Add to Sileo
        </a>
    </div>

</body>
</html>
